name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: 925e2558d73fa3417c800237a488fcd5

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set GITHUB_TOKEN for Worker
        shell: bash
        run: echo "${{ github.token }}" | npx wrangler pages secret put GITHUB_TOKEN --project-name gh-readme-stats || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy . --project-name gh-readme-stats --branch master
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
